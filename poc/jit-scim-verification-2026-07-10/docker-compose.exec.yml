# PoC 実際の実行用 compose（この端末 = devcontainer + docker-desktop 環境向け）
# 元の docker-compose.yml との差分:
#   1. bind mount を廃止し、Dockerfile.poc で config/JAR を焼き込む（マウント問題回避）
#   2. KC_FEATURES を Keycloak 26.6 の実際の feature 名に修正
#      - scim-realm-api  -> scim-api        （26.6 実機で確認）
#      - declarative-user-profile -> 廃止   （26 系で GA・デフォルト化。指定すると起動失敗）
name: poc-jit-scim-exec

services:
  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.poc
    image: poc-keycloak-266-baked
    container_name: poc-keycloak-266
    ports:
      - "18080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_poc
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_poc_2026
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_poc_2026
      KC_FEATURES: scim-api,admin-fine-grained-authz
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command:
      - start-dev
      - --import-realm
      - --log-level=INFO,org.keycloak.events:DEBUG
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: poc-postgres-16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: keycloak_poc
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_poc_2026
    volumes:
      - pgdata_poc:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak_poc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_poc:
